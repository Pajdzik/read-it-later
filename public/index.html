<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f4ee" />
    <title>Read Later</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="appShell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Kamilpedia</p>
          <h1>Read Later</h1>
        </div>
        <div class="topCluster">
          <button id="themeButton" class="iconButton" type="button" aria-label="Switch to dark mode" title="Theme">
            <svg class="systemIcon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="18" height="12" rx="2" />
              <path d="M8 20h8m-4-4v4" />
            </svg>
            <svg class="sunIcon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
            <svg class="moonIcon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.99 12.62A8.5 8.5 0 1 1 11.38 3.01a6.5 6.5 0 1 0 9.61 9.61Z" />
            </svg>
          </button>
          <div class="topStats" aria-live="polite">
            <span id="articleCount">0 articles</span>
            <span id="unreadCount">0 unread</span>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="libraryPane" aria-label="Article library">
          <div class="controls">
            <label class="searchBox">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
              </svg>
              <input id="searchInput" type="search" placeholder="Search articles" autocomplete="off" />
            </label>

            <div class="controlGrid">
              <label>
                <span>Sort</span>
                <select id="sortSelect">
                  <option value="latest">Latest added</option>
                  <option value="published">Published date</option>
                  <option value="title">Title A-Z</option>
                  <option value="reading">Reading time</option>
                  <option value="category">Category</option>
                  <option value="unread">Unread first</option>
                </select>
              </label>

              <label>
                <span>Category</span>
                <select id="categorySelect">
                  <option value="all">All categories</option>
                </select>
              </label>
            </div>

            <div class="segmented" role="group" aria-label="Read filter">
              <button class="segmentButton isActive" type="button" data-filter="all">All</button>
              <button class="segmentButton" type="button" data-filter="unread">Unread</button>
              <button class="segmentButton" type="button" data-filter="read">Read</button>
            </div>
          </div>

          <ol id="articleList" class="articleList" aria-live="polite"></ol>
        </section>

        <section class="readerPane" aria-label="Article reader">
          <div id="readerEmpty" class="readerEmpty">
            <h2>No article selected</h2>
            <p>Select an article from the list.</p>
          </div>

          <article id="reader" class="reader" hidden>
            <header class="readerHeader">
              <button id="backButton" class="iconButton mobileOnly" type="button" aria-label="Back to list" title="Back">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m15 18-6-6 6-6" />
                </svg>
              </button>
              <div class="readerTitleBlock">
                <p id="readerCategory" class="eyebrow"></p>
                <h2 id="readerTitle"></h2>
                <div id="readerMeta" class="readerMeta"></div>
              </div>
              <div class="readerActions">
                <a id="sourceLink" class="iconButton" href="#" target="_blank" rel="noreferrer" aria-label="Open original" title="Open original">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M15 3h6v6m-1-5-9 9" />
                    <path d="M11 5H7a4 4 0 0 0-4 4v8a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4v-4" />
                  </svg>
                </a>
                <button id="readButton" class="primaryButton" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20 6 9 17l-5-5" />
                  </svg>
                  <span>Mark read</span>
                </button>
              </div>
            </header>

            <div id="articleContent" class="articleContent"></div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
